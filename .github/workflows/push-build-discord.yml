name: Build Jar and Send to Discord

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-notify:
    name: Build jar and post to Discord webhook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Prepare nightly jar artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(ls build/libs/*.jar | grep -Ev '(-sources|-javadoc)' | head -n 1 || true)"
          if [[ -z "${artifact}" ]]; then
            echo "No jar artifact found in build/libs"
            exit 1
          fi
          short_sha="${GITHUB_SHA:0:8}"
          nightly_name="createpropulsion-nightly-${short_sha}.jar"
          nightly_path="build/libs/${nightly_name}"
          cp "${artifact}" "${nightly_path}"
          echo "path=${nightly_path}" >> "${GITHUB_OUTPUT}"
          echo "name=${nightly_name}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Send jar to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.name }}
          SHORT_SHA: ${{ steps.artifact.outputs.short_sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "Missing required secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

          commit_url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          payload="$(cat <<EOF
{"embeds":[{"title":"Nightly build ${SHORT_SHA}","url":"${commit_url}","description":"Built from \`${GITHUB_REPOSITORY}\`","color":5814783,"fields":[{"name":"Branch","value":"\`${GITHUB_REF_NAME}\`","inline":true},{"name":"Commit","value":"[\`${SHORT_SHA}\`](${commit_url})","inline":true},{"name":"Artifact","value":"\`${ARTIFACT_NAME}\`","inline":false}]}]}
EOF
)"

          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -F "payload_json=${payload}" \
            -F "file1=@${ARTIFACT_PATH};filename=${ARTIFACT_NAME}"
