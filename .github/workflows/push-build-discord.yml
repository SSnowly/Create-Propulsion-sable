name: Build Jar and Send to Discord

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-notify:
    name: Build jar and post to Discord webhook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Select jar artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="$(ls build/libs/*.jar | grep -Ev '(-sources|-javadoc)' | head -n 1 || true)"
          if [[ -z "${artifact}" ]]; then
            echo "No jar artifact found in build/libs"
            exit 1
          fi
          echo "path=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "name=$(basename "${artifact}")" >> "${GITHUB_OUTPUT}"

      - name: Send jar to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARTIFACT_PATH: ${{ steps.artifact.outputs.path }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "Missing required secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

          message="New push build for ${GITHUB_REPOSITORY} | Branch: ${GITHUB_REF_NAME} | Commit: ${GITHUB_SHA} | Artifact: ${ARTIFACT_NAME}"

          curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -F "payload_json={\"content\":\"${message}\"}" \
            -F "file1=@${ARTIFACT_PATH};filename=${ARTIFACT_NAME}"
